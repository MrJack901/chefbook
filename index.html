<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- Disabilita zoom su iOS per evitare problemi di layout -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Nome app -->
    <title>Chef's Book</title>
    <meta name="application-name" content="Chef's Book" />
    <meta name="apple-mobile-web-app-title" content="Chef's Book" />

    <!-- PWA / standalone su iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#A8621A" />

    <!-- Icona per "Aggiungi a Home" su iPhone -->
    <link rel="apple-touch-icon" href="/icon-apple.png" />

    <!-- Manifest PWA (per Android e browser) -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon standard -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
